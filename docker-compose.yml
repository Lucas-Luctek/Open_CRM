services:
  crm:
    build: .
    ports:
      - "${HOST_PORT:-5000}:5000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-changez-cette-cle-en-production-svp}
      COMPANY_NAME: ${COMPANY_NAME:-MON ENTREPRISE}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      DATA_DIR: /data
      PORT: "5000"
      FLASK_DEBUG: "false"
    volumes:
      - crm_data:/data
    restart: unless-stopped

volumes:
  crm_data:
